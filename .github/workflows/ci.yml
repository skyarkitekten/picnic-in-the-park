name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-dotnet:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ./src/PicnicPlanner.slnx

      - name: Format check
        run: dotnet format ./src/PicnicPlanner.slnx --verify-no-changes --no-restore --verbosity normal

      - name: Build
        run: dotnet build ./src/PicnicPlanner.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ./src/PicnicPlanner.slnx --no-build --configuration Release --verbosity normal

  build-frontend:
    name: Build & Lint (Frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
